<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Blue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f0f0f" media="(display-mode: browser)" />
  <meta name="theme-color" content="#0000aa" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48x48.png" />
  <link rel="apple-touch-icon" href="icons/favicon-512x512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Blue" />
  <link rel="stylesheet" href="blue.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="status" aria-live="polite">
    <span id="status-dirty" aria-label="File edit state">[<span id="status-dirty-box"> </span>]</span>
    <span id="status-filename"></span>
  </div>
  <textarea id="editor" spellcheck="false" autofocus></textarea>
  <input id="fileInput" type="file" />
  <div id="status-bottom" aria-live="polite">
    <span id="status-pos">1:1</span>
  </div>

  <div id="help" role="dialog" aria-modal="true" aria-labelledby="help-title" data-open="false">
    <div id="help-panel">
      <h2 id="help-title">Blue — Keyboard Shortcuts</h2>
      <table>
        <tbody>
          <tr data-action="help"><td class="action">Help</td><td class="key" data-keys="F1">F1</td></tr>
          <tr data-action="rename"><td class="action">Rename file</td><td class="key" data-keys="F2">F2</td></tr>
          <tr data-action="new"><td class="action">New file</td><td class="key" data-keys="Mod+N">Cmd/Ctrl+N</td></tr>
          <tr data-action="open"><td class="action">Open file</td><td class="key" data-keys="Mod+O">Cmd/Ctrl+O</td></tr>
          <tr data-action="save"><td class="action">Save</td><td class="key" data-keys="Mod+S">Cmd/Ctrl+S</td></tr>
          <tr data-action="saveAs"><td class="action">Save As</td><td class="key" data-keys="Mod+Shift+S">Cmd/Ctrl+Shift+S</td></tr>
          <tr data-action="indent"><td class="action">Indent</td><td class="key" data-keys="Tab">Tab</td></tr>
          <tr data-action="outdent"><td class="action">Outdent</td><td class="key" data-keys="Shift+Tab">Shift+Tab</td></tr>
        </tbody>
      </table>
      <div class="hint">Press F1 or Esc to close.</div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
