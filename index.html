<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ponder Turbo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f0f0f" />

  <style>
    :root {
      color-scheme: dark;
      --editor-bg: #0000aa;   /* Turbo Pascal-style blue */
      --editor-fg: #ffff55;   /* Turbo Pascal bright yellow */
      --editor-highlight: #ffffff; /* previous foreground (white) */
      --editor-dark: #888888;      /* gray accent */
      --status-height: 2.25rem;
      --status-line: var(--editor-highlight);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: #0f0f0f; /* neutral so browser chrome stays dark, not blue */
      color: var(--editor-fg);
      font-family: "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono",
        "Courier New", monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #status {
      position: relative;
      height: var(--status-height);
      background: var(--editor-bg);
      color: var(--editor-highlight);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.75rem;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--status-line);
      pointer-events: none;
      transform: translateY(-50%);
    }

    #status-filename {
      display: inline-block;
      padding: 0 1rem;
      background: var(--editor-bg);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    #status-dirty {
      position: absolute;
      left: 1.25rem;
      color: var(--editor-dark);
      opacity: 0.9;
      font-size: 0.9rem;
      background: var(--editor-bg);
      z-index: 1;
    }

    #status-dirty-box {
      color: #00ff00;
    }

    #editor {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0; /* allow scrolling within flex parent */
      padding: 1rem;
      border: none;
      margin: 0;
      background: var(--editor-bg);
      color: var(--editor-fg);
      font: inherit;
      line-height: 1.3;
      resize: none;
      outline: none;
      caret-color: var(--editor-fg);
      tab-size: 4;
      -moz-tab-size: 4;
      white-space: pre-wrap;
    }

    /* Mobile: make sure the viewport is usable */
    @media (max-width: 600px) {
      #editor {
        padding: 0.75rem;
      }
    }

    /* Hide the file input; it's only triggered from the keyboard shortcut */
    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <div id="status" aria-live="polite">
    <span id="status-dirty" aria-label="File edit state">[<span id="status-dirty-box"> </span>]</span>
    <span id="status-filename"></span>
  </div>
  <textarea id="editor" spellcheck="false"></textarea>
  <input id="fileInput" type="file" accept="text/*,.txt,.md,.log" />

  <script type="module">
    (async function () {
      const editor = document.getElementById("editor");
      const fileInput = document.getElementById("fileInput");
      const statusFilename = document.getElementById("status-filename");
      const statusDirty = document.getElementById("status-dirty");
      const statusDirtyBox = document.getElementById("status-dirty-box");
      const defaultConfig = {
        wordWrap: true,
        background: "#0000aa",
        foreground: "#ffff55",
        highlight: "#ffffff",
        dark: "#888888",
      };

      const INDENT = "\t";
      const STATUS_FRONT = 15;
      const STATUS_BACK = 15;
      let currentFilename = "";
      let fileHandle = null;
      let tauriFilePath = null;
      let tauriCwd = null;
      let isDirty = false;
      let baselineHash = "";
      const tauri = window.__TAURI__;
      const tauriCore = tauri?.core;
      let tauriDialog = null;
      let tauriFs = null;
      try {
        tauriDialog = await import("@tauri-apps/plugin-dialog");
        tauriFs = await import("@tauri-apps/plugin-fs");
      } catch (_err) {
        tauriDialog = null;
        tauriFs = null;
      }

      applyConfig(defaultConfig);
      loadConfig().then(applyConfig);
      initTauriCwd();

      // Listen for native menu events (Tauri desktop). No-ops in browser preview.
      try {
        tauri?.event?.listen("menu-new", () => newFile());
        tauri?.event?.listen("menu-open", () => openFileDialog());
        tauri?.event?.listen("menu-save", () => saveFile());
        tauri?.event?.listen("menu-save-as", () => saveFileAs());
      } catch (_err) {
        // ignore if Tauri globals aren't available
      }

      // Start blank and place the caret at the beginning
      editor.value = "";
      editor.selectionStart = 0;
      editor.selectionEnd = 0;
      baselineHash = md5(editor.value);
      updateStatus();

      editor.addEventListener("keydown", (event) => {
        if (event.key === "Tab") {
          handleTabKey(event);
        } else if (event.key === "Enter") {
          handleEnterKey(event);
        }
      });

      editor.addEventListener("input", () => {
        updateDirtyStateFromContent();
      });

      // --- Keyboard shortcuts for Load / Save (Turbo Pascal-style) ---
      let awaitingChord = false;
      let chordTimer = null;

      window.addEventListener("keydown", (event) => {
        // Accept either Command or Control on macOS; Control on other platforms
        const modKey = event.ctrlKey || event.metaKey;
        const key = event.key.toLowerCase();

        if (modKey && key === "s") {
          event.preventDefault();
          if (event.shiftKey) {
            saveFileAs();
          } else {
            saveFile();
          }
          resetChord();
          return;
        }

        if (modKey && key === "n") {
          event.preventDefault();
          newFile();
          resetChord();
          return;
        }

        if (modKey && key === "o") {
          event.preventDefault();
          openFileDialog();
          resetChord();
          return;
        }

        // Second stroke after Ctrl/Cmd+K
        if (awaitingChord) {
          if (key === "s") {
            event.preventDefault();
            resetChord();
            saveFile();
            return;
          }
          if (key === "o") {
            event.preventDefault();
            resetChord();
            openFileDialog();
            return;
          }
          resetChord();
          return;
        }

        // Start chord: Ctrl/Cmd+K then wait up to 3s for S or O
        if (modKey && key === "k") {
          event.preventDefault();
          awaitingChord = true;
          chordTimer = setTimeout(resetChord, 3000);
        }
      });

      function resetChord() {
        awaitingChord = false;
        if (chordTimer) {
          clearTimeout(chordTimer);
          chordTimer = null;
        }
      }

      // --- Load (upload) logic ---
      function openFileDialog() {
        openViaTauriDialog().catch(() => {
          fileInput.click();
        });
      }

      fileInput.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          editor.value = e.target.result || "";
          currentFilename = file.name || "note.txt";
          fileHandle = null;
          tauriFilePath = null;
          baselineHash = md5(editor.value);
          isDirty = false;
          updateStatus();

          // Move caret to start so view stays at top
          editor.selectionStart = 0;
          editor.selectionEnd = 0;
          editor.focus();
        };
        reader.readAsText(file);

        // Reset the input so selecting the same file again still fires change
        fileInput.value = "";
      });

      function newFile() {
        editor.value = "";
        currentFilename = "";
        fileHandle = null;
        tauriFilePath = null;
        baselineHash = md5(editor.value);
        isDirty = false;
        updateStatus();
        editor.selectionStart = 0;
        editor.selectionEnd = 0;
        editor.focus();
      }

      // --- Save (download/write) logic ---
      async function saveFile() {
        // If we have a Tauri path, attempt to write directly
        if (tauriFs && tauriFilePath) {
          try {
            await tauriFs.writeTextFile(tauriFilePath, editor.value);
            baselineHash = md5(editor.value);
            isDirty = false;
            updateStatus();
            return;
          } catch (_err) {
            // If writing failed, perhaps due to permissions or file deletion,
            // fall back to Save As to prompt user for new location.
            console.error("Failed to write to existing file, falling back to Save As:", _err);
            return saveFileAs();
          }
        }

        // Fallback for browser environments or other errors
        if (fileHandle && fileHandle.createWritable) {
          try {
            await writeToHandle(fileHandle);
            baselineHash = md5(editor.value);
            isDirty = false;
            updateStatus();
            return;
          } catch (_err) {
            // fall back to download if write fails
          }
        }

        // If we're on desktop but don't yet have a path, ask for one
        if (tauriFs) {
          return saveFileAs();
        }

        downloadFile(currentFilename || "note.txt");
        baselineHash = md5(editor.value);
        isDirty = false;
        updateStatus();
      }

      function filenameFromPath(path) {
        return path.split(/[\\/]/).pop();
      }

      async function saveFileAs() {
        if (tauriDialog && tauriFs) {
          try {
            await initTauriCwd();
            const path = await tauriDialog.save({
              defaultPath: joinPath(
                tauriCwd,
                currentFilename || "note.txt"
              ),
            });
            if (!path) {
              return;
            }
            await tauriFs.writeTextFile(path, editor.value);
            tauriFilePath = path;
            currentFilename = filenameFromPath(path) || currentFilename;
            fileHandle = null;
            baselineHash = md5(editor.value);
            isDirty = false;
            updateStatus();
            return;
          } catch (_err) {
            // fall through to browser-style save
          }
        }

        if (window.showSaveFilePicker) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: currentFilename || "note.txt",
              types: [
                {
                  description: "Text",
                  accept: { "text/plain": [".txt", ".md", ".log", ".text"] },
                },
              ],
            });
            fileHandle = handle;
            currentFilename = handle.name || currentFilename;
            await writeToHandle(handle);
            baselineHash = md5(editor.value);
            isDirty = false;
            updateStatus();
            return;
          } catch (err) {
            if (err && err.name === "AbortError") return;
            // fall through to browser-style save
          }
        }

        const nextName = prompt("Save as", currentFilename || "note.txt");
        if (nextName === null) return;
        const trimmed = nextName.trim();
        if (!trimmed) return;
        currentFilename = trimmed;
        fileHandle = null;
        downloadFile(trimmed);
        baselineHash = md5(editor.value);
        isDirty = false;
        updateStatus();
      }

      async function writeToHandle(handle) {
        const writable = await handle.createWritable();
        await writable.write(editor.value);
        await writable.close();
      }

      async function buildDefaultPath(nameOnly) {
        if (tauriFilePath) return tauriFilePath;
        let cwd = tauriCwd;
        if (!cwd) {
          cwd = await tauriCore?.invoke("current_directory").catch(() => null);
          if (cwd) tauriCwd = cwd;
        }
        if (cwd) {
          return joinPath(cwd, nameOnly || currentFilename || "note.txt");
        }
        return nameOnly || currentFilename || "note.txt";
      }

      async function openViaTauriDialog() {
        if (!(tauriDialog && tauriFs && tauriCore)) throw new Error("no tauri dialog");
        const defaultPath = await buildDefaultPath();
        const selected = await tauriDialog.open({
          multiple: false,
          filters: [
            {
              name: "Text",
              extensions: ["txt", "md", "log", "text", "*"],
            },
          ],
          defaultPath: defaultPath || undefined,
        });
        if (!selected || Array.isArray(selected)) {
          return;
        }
        const contents = await tauriFs.readTextFile(selected);
        editor.value = contents;
        currentFilename = filenameFromPath(selected) || "note.txt";
        tauriFilePath = selected;
        fileHandle = null;
        baselineHash = md5(editor.value);
        isDirty = false;
        updateStatus();
        editor.selectionStart = 0;
        editor.selectionEnd = 0;
        editor.focus();
      }

      async function initTauriCwd() {
        if (tauriCwd !== null || !tauriCore) return;
        tauriCwd = await tauriCore.invoke("current_directory").catch(() => null);
        if (tauriCwd) updateStatus();
      }

      function joinPath(dir, name) {
        if (!name) return dir;
        const sep = dir.endsWith("/") || dir.endsWith("\\") ? "" : "/";
        return `${dir}${sep}${name}`;
      }

      function downloadFile(name) {
        const blob = new Blob([editor.value], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = name || "note.txt";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // Focus editor on load
      window.addEventListener("load", () => {
        editor.focus();
      });

      function handleTabKey(event) {
        event.preventDefault();

        const { selectionStart, selectionEnd, value } = editor;

        if (selectionStart === selectionEnd) {
          if (event.shiftKey) {
            outdentCaret(selectionStart, value);
          } else {
            insertIndent(selectionStart, value);
          }
          return;
        }

        adjustBlockIndent(event.shiftKey, selectionStart, selectionEnd, value);
      }

      function insertIndent(pos, value) {
        const newValue = value.slice(0, pos) + INDENT + value.slice(pos);
        const newPos = pos + INDENT.length;
        editor.value = newValue;
        editor.setSelectionRange(newPos, newPos);
        triggerInputSync();
      }

      function outdentCaret(pos, value) {
        const lookStart = Math.max(0, pos - INDENT.length);
        const chunk = value.slice(lookStart, pos);
        const matchTab = chunk === "\t";
        const matchSpaces = chunk.match(/ {1,4}$/);
        const removeCount = matchTab ? 1 : matchSpaces ? matchSpaces[0].length : 0;
        if (!removeCount) return;

        const newValue =
          value.slice(0, pos - removeCount) + value.slice(pos);
        const newPos = pos - removeCount;
        editor.value = newValue;
        editor.setSelectionRange(newPos, newPos);
        triggerInputSync();
      }

      function adjustBlockIndent(isOutdent, start, end, value) {
        const startLine = value.lastIndexOf("\n", start - 1) + 1;
        const endLineBreak = value.indexOf("\n", end);
        const endLine = endLineBreak === -1 ? value.length : endLineBreak;
        const lines = value.slice(startLine, endLine).split("\n");

        if (!isOutdent) {
          const indented = lines.map((line) => INDENT + line);
          const newValue =
            value.slice(0, startLine) + indented.join("\n") + value.slice(endLine);
          const deltaTotal = INDENT.length * lines.length;
          editor.value = newValue;
          editor.setSelectionRange(start + INDENT.length, end + deltaTotal);
          triggerInputSync();
          return;
        }

        let removedTotal = 0;
        let removedStart = 0;
        const outdented = lines.map((line, idx) => {
          const leading = line.match(/^[ \t]*/)[0];
          const removeCount = leading.startsWith("\t")
            ? 1
            : Math.min(4, leading.length);
          if (idx === 0) removedStart = removeCount;
          removedTotal += removeCount;
          return line.slice(removeCount);
        });

        const newValue =
          value.slice(0, startLine) + outdented.join("\n") + value.slice(endLine);
        const newStart = Math.max(start - removedStart, startLine);
        const newEnd = Math.max(newStart, end - removedTotal);
        editor.value = newValue;
        editor.setSelectionRange(newStart, newEnd);
        triggerInputSync();
      }

      function handleEnterKey(event) {
        event.preventDefault();
        const { selectionStart, selectionEnd, value } = editor;
        const atEnd = selectionEnd === value.length;

        const lineStart = value.lastIndexOf("\n", selectionStart - 1) + 1;
        const currentLine = value.slice(lineStart, selectionStart);
        const indentMatch = currentLine.match(/^\t*/);
        const currentIndent = indentMatch ? indentMatch[0] : "";

        const insertion = "\n" + currentIndent;
        const newValue =
          value.slice(0, selectionStart) +
          insertion +
          value.slice(selectionEnd);
        const newPos = selectionStart + insertion.length;

        editor.value = newValue;
        editor.setSelectionRange(newPos, newPos);
        triggerInputSync();
        if (atEnd) {
          editor.scrollTop = editor.scrollHeight;
        }
      }

      function triggerInputSync() {
        editor.dispatchEvent(new Event("input", { bubbles: true }));
      }

      async function loadConfig() {
        try {
          const res = await fetch("blue.json", { cache: "no-store" });
          if (!res.ok) return defaultConfig;
          const data = await res.json();
          return { ...defaultConfig, ...data };
        } catch (_err) {
          return defaultConfig;
        }
      }

      function applyConfig(config) {
        const wrap = config.wordWrap !== false;
        editor.setAttribute("wrap", wrap ? "soft" : "off");
        editor.style.whiteSpace = wrap ? "pre-wrap" : "pre";
        editor.style.overflowX = wrap ? "hidden" : "auto";

        const background =
          typeof config.background === "string"
            ? config.background
            : defaultConfig.background;
        const foreground =
          typeof config.foreground === "string"
            ? config.foreground
            : defaultConfig.foreground;
        const highlight =
          typeof config.highlight === "string"
            ? config.highlight
            : defaultConfig.highlight;
        const dark =
          typeof config.dark === "string" ? config.dark : defaultConfig.dark;
        const rootStyle = document.documentElement.style;
        rootStyle.setProperty("--editor-bg", background);
        rootStyle.setProperty("--editor-fg", foreground);
        rootStyle.setProperty("--editor-highlight", highlight);
        rootStyle.setProperty("--editor-dark", dark);
        editor.style.caretColor = foreground;
      }

      function updateStatus() {
        if (statusDirtyBox) {
          statusDirtyBox.textContent = isDirty ? "*" : " ";
          statusDirty?.setAttribute(
            "aria-label",
            isDirty ? "File has unsaved changes" : "File is saved"
          );
        }
        if (!statusFilename) return;
        const nameForStatus = getDisplayPath();
        statusFilename.textContent = shortenName(
          nameForStatus || "Untitled",
          STATUS_FRONT,
          STATUS_BACK
        );
      }

      function updateDirtyStateFromContent() {
        const currentHash = md5(editor.value);
        const nextDirty = currentHash !== baselineHash;
        if (nextDirty !== isDirty) {
          isDirty = nextDirty;
          updateStatus();
        }
      }

      function getDisplayPath() {
        if (tauriFilePath) {
          return relativeToCwd(tauriCwd, tauriFilePath);
        }
        if (fileHandle && fileHandle.name) {
          return fileHandle.name;
        }
        return currentFilename || "";
      }

      function shortenName(name, front, back) {
        if (!name) return "Untitled";
        if (typeof name !== "string") return "Untitled";
        const max = front + back + 3;
        if (name.length <= max) return name;
        const start = name.slice(0, front);
        const end = name.slice(name.length - back);
        return `${start}...${end}`;
      }

      function relativeToCwd(base, target) {
        if (!base || !target) return target || "";
        const normalize = (p) => p.replace(/\\/g, "/").replace(/\/+$/, "");
        const nBase = normalize(base);
        const nTarget = normalize(target);
        if (nTarget.startsWith(nBase)) {
          const trimmed = nTarget.slice(nBase.length);
          const cleaned = trimmed.replace(/^[/\\]/, "");
          return cleaned || target;
        }
        return target;
      }

      function md5(message) {
        const data = new TextEncoder().encode(message);
        const len = data.length;
        const words = new Uint32Array(((len + 9 + 63) >>> 6) * 16);

        for (let i = 0; i < len; i++) {
          words[i >> 2] |= data[i] << ((i % 4) * 8);
        }
        words[len >> 2] |= 0x80 << ((len % 4) * 8);
        words[words.length - 2] = len * 8;

        let a = 0x67452301;
        let b = 0xefcdab89;
        let c = 0x98badcfe;
        let d = 0x10325476;

        for (let i = 0; i < words.length; i += 16) {
          const savedA = a;
          const savedB = b;
          const savedC = c;
          const savedD = d;

          a = ff(a, b, c, d, words[i + 0], 7, 0xd76aa478);
          d = ff(d, a, b, c, words[i + 1], 12, 0xe8c7b756);
          c = ff(c, d, a, b, words[i + 2], 17, 0x242070db);
          b = ff(b, c, d, a, words[i + 3], 22, 0xc1bdceee);
          a = ff(a, b, c, d, words[i + 4], 7, 0xf57c0faf);
          d = ff(d, a, b, c, words[i + 5], 12, 0x4787c62a);
          c = ff(c, d, a, b, words[i + 6], 17, 0xa8304613);
          b = ff(b, c, d, a, words[i + 7], 22, 0xfd469501);
          a = ff(a, b, c, d, words[i + 8], 7, 0x698098d8);
          d = ff(d, a, b, c, words[i + 9], 12, 0x8b44f7af);
          c = ff(c, d, a, b, words[i + 10], 17, 0xffff5bb1);
          b = ff(b, c, d, a, words[i + 11], 22, 0x895cd7be);
          a = ff(a, b, c, d, words[i + 12], 7, 0x6b901122);
          d = ff(d, a, b, c, words[i + 13], 12, 0xfd987193);
          c = ff(c, d, a, b, words[i + 14], 17, 0xa679438e);
          b = ff(b, c, d, a, words[i + 15], 22, 0x49b40821);

          a = gg(a, b, c, d, words[i + 1], 5, 0xf61e2562);
          d = gg(d, a, b, c, words[i + 6], 9, 0xc040b340);
          c = gg(c, d, a, b, words[i + 11], 14, 0x265e5a51);
          b = gg(b, c, d, a, words[i + 0], 20, 0xe9b6c7aa);
          a = gg(a, b, c, d, words[i + 5], 5, 0xd62f105d);
          d = gg(d, a, b, c, words[i + 10], 9, 0x02441453);
          c = gg(c, d, a, b, words[i + 15], 14, 0xd8a1e681);
          b = gg(b, c, d, a, words[i + 4], 20, 0xe7d3fbc8);
          a = gg(a, b, c, d, words[i + 9], 5, 0x21e1cde6);
          d = gg(d, a, b, c, words[i + 14], 9, 0xc33707d6);
          c = gg(c, d, a, b, words[i + 3], 14, 0xf4d50d87);
          b = gg(b, c, d, a, words[i + 8], 20, 0x455a14ed);
          a = gg(a, b, c, d, words[i + 13], 5, 0xa9e3e905);
          d = gg(d, a, b, c, words[i + 2], 9, 0xfcefa3f8);
          c = gg(c, d, a, b, words[i + 7], 14, 0x676f02d9);
          b = gg(b, c, d, a, words[i + 12], 20, 0x8d2a4c8a);

          a = hh(a, b, c, d, words[i + 5], 4, 0xfffa3942);
          d = hh(d, a, b, c, words[i + 8], 11, 0x8771f681);
          c = hh(c, d, a, b, words[i + 11], 16, 0x6d9d6122);
          b = hh(b, c, d, a, words[i + 14], 23, 0xfde5380c);
          a = hh(a, b, c, d, words[i + 1], 4, 0xa4beea44);
          d = hh(d, a, b, c, words[i + 4], 11, 0x4bdecfa9);
          c = hh(c, d, a, b, words[i + 7], 16, 0xf6bb4b60);
          b = hh(b, c, d, a, words[i + 10], 23, 0xbebfbc70);
          a = hh(a, b, c, d, words[i + 13], 4, 0x289b7ec6);
